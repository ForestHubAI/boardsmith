<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0D0D0D"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#FFFFFF" stroke-width="0.5">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- ASCII Art "Boardsmith" -->
  <g font-family="'Courier New', Courier, monospace" fill="#FF3D00" text-anchor="middle">
    <text x="640" y="155" font-size="28" xml:space="preserve"> ____                      _               _ _   _     </text>
    <text x="640" y="185" font-size="28" xml:space="preserve">| __ )  ___   __ _ _ __ __| |___ _ __ ___ (_) |_| |__  </text>
    <text x="640" y="215" font-size="28" xml:space="preserve">|  _ \ / _ \ / _` | '__/ _` / __| '_ ` _ \| | __| '_ \ </text>
    <text x="640" y="245" font-size="28" xml:space="preserve">| |_) | (_) | (_| | | | (_| \__ \ | | | | | | |_| | | |</text>
    <text x="640" y="275" font-size="28" xml:space="preserve">|____/ \___/ \__,_|_|  \__,_|___/_| |_| |_|_|\__|_| |_|</text>
  </g>

  <!-- Tagline -->
  <text x="640" y="340" font-family="'Courier New', Courier, monospace" font-size="22" fill="#CCCCCC" text-anchor="middle">
    Text prompt &#x2192; KiCad schematic, BOM, and firmware
  </text>

  <!-- Prompt → Output visual -->
  <g transform="translate(640, 430)">
    <!-- Input box -->
    <rect x="-310" y="-35" width="200" height="70" rx="8" fill="none" stroke="#FF3D00" stroke-width="2"/>
    <text x="-210" y="5" font-family="'Courier New', monospace" font-size="15" fill="#FF3D00" text-anchor="middle">$ boardsmith build</text>

    <!-- Arrow -->
    <line x1="-90" y1="0" x2="90" y2="0" stroke="#555555" stroke-width="2"/>
    <polygon points="90,-6 102,0 90,6" fill="#555555"/>

    <!-- Output box -->
    <rect x="110" y="-35" width="200" height="70" rx="8" fill="none" stroke="#A7A284" stroke-width="2"/>
    <text x="210" y="-8" font-family="'Courier New', monospace" font-size="13" fill="#A7A284" text-anchor="middle">.kicad_sch</text>
    <text x="210" y="12" font-family="'Courier New', monospace" font-size="13" fill="#A7A284" text-anchor="middle">bom.json</text>
    <text x="210" y="32" font-family="'Courier New', monospace" font-size="11" fill="#666666" text-anchor="middle">+ firmware + gerber</text>
  </g>

  <!-- "by ForestHub.ai" -->
  <text x="1240" y="610" font-family="'Courier New', monospace" font-size="14" fill="#A7A284" text-anchor="end" opacity="0.7">
    by ForestHub.ai
  </text>

  <!-- pip install hint -->
  <text x="640" y="560" font-family="'Courier New', monospace" font-size="16" fill="#666666" text-anchor="middle">
    pip install boardsmith
  </text>
</svg>
